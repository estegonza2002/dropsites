# DropSites Helm Chart — Default Values
# Override these in your own values file or via --set flags.

replicaCount: 2

image:
  repository: dropsites/dropsites
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: dropsites.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dropsites-tls
      hosts:
        - dropsites.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# -- Application configuration (non-secret)
config:
  NODE_ENV: production
  PORT: "3000"
  STORAGE_BACKEND: s3
  NEXT_PUBLIC_APP_URL: "https://dropsites.example.com"

# -- Secrets (base64-encoded values required)
secrets:
  DATABASE_URL: ""
  SUPABASE_URL: ""
  SUPABASE_ANON_KEY: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  S3_ENDPOINT: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  S3_BUCKET: ""
  RESEND_API_KEY: ""
  SENTRY_DSN: ""

# -- Pod-level settings
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
